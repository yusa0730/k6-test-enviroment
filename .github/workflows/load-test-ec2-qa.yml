name: Load Test EC2 (k6 on EC2)

# k6負荷試験をEC2インスタンス上で実行し、結果をS3に残す。手動トリガー限定（workflow_dispatch）。
# ECS版 (.github/workflows/load-test-qa.yml) と役割は同じだが、コンピュートにECS Fargateではなく
# EC2インスタンス（run-instancesでオンデマンド起動・自己終了）を使う版。
# 実行には事前に GitHub Actions -> AWS への OIDC ロール（secrets.AWS_OIDC_ROLE_ARN、ECS版と共用）の
# 設定が必要。

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "実行するシナリオ名（load-test/scenarios/<name>.js。ECS版と同じシナリオを共有）"
        required: true
        type: string
        default: "smoke-rest"
      infra_action:
        description: "load-test-ec2インフラ(VPC/EC2/S3等)への操作。none以外はシナリオ実行を行わない。removeの前に必ずdiffで差分を確認すること"
        required: true
        type: choice
        options:
          - none
          - diff
          - deploy
          - remove
        default: none
      confirm_remove:
        description: 'infra_action=remove を実行する場合のみ "REMOVE" と入力（誤操作防止）'
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

# 同一の単一VPC/Elastic IP/S3バケットを共有するため、同時実行を許可すると
# インフラ操作とテスト実行が競合しうる（特にEIPは同時に1インスタンスにしかassociateできない）。
# キューイングして直列化する（実行中のインフラ変更やテストを取り消したくないため
# cancel-in-progress は false）。
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  STAGE: qa
  RESOURCE_PREFIX: k6env-load-test-ec2
  LAUNCH_TEMPLATE_NAME: k6env-load-test-ec2-launch-template-qa
  BUCKET_NAME: k6env-load-test-ec2-bucket-qa
  # 対象URL・認証情報はここには置かない。実行時にEC2上のrun-load-test.shが
  # このパス配下をSSM Parameter Storeから直接取得する（README.mdのEC2版セクション参照）。
  # STAGE と別の文字列として持つと将来STAGEを変更した際に静かにズレるため、
  # 固定のprefix部分だけをここに置き、STAGEと組み合わせて使う箇所で都度連結する。
  SSM_PARAMETER_PREFIX_BASE: /k6env/load-test/ec2

jobs:
  infra-diff:
    if: inputs.infra_action == 'diff' || inputs.infra_action == 'remove'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: sst diff (load-test-ec2)
        run: |
          echo "## sst diff --stage qa" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          set +e
          pnpm --filter load-test-ec2 run sst:diff --stage qa 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          DIFF_EXIT=${PIPESTATUS[0]}
          set -e
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $DIFF_EXIT
        env:
          SST_TELEMETRY_DISABLED: 1

      # sst diff は「今デプロイし直したら何が変わるか」であり「removeで何が消えるか」ではない。
      # remove前の承認判断には実際に現存するリソースの一覧が必要なため、別途調べて出す。
      - name: Resource inventory before remove
        if: inputs.infra_action == 'remove'
        run: |
          {
            echo ""
            echo "## 削除対象リソース一覧（現時点でAWS上に存在するもの）"
            echo ""
            echo "| リソース | 状態 |"
            echo "|---|---|"

            VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=${{ env.RESOURCE_PREFIX }}-vpc-${{ env.STAGE }}" --query "Vpcs[0].VpcId" --output text)
            echo "| VPC (${{ env.RESOURCE_PREFIX }}-vpc-${{ env.STAGE }}) | ${VPC_ID} |"

            EIP=$(aws ec2 describe-addresses --filters "Name=tag:Name,Values=${{ env.RESOURCE_PREFIX }}-eip-${{ env.STAGE }}" --query "Addresses[0].PublicIp" --output text)
            echo "| Elastic IP | ${EIP} |"

            RUNNING=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=${{ env.RESOURCE_PREFIX }}-instance-${{ env.STAGE }}" "Name=instance-state-name,Values=pending,running" --query "length(Reservations[].Instances[])" --output text)
            echo "| 実行中インスタンス | ${RUNNING}台 |"

            LT_ID=$(aws ec2 describe-launch-templates --launch-template-names "${{ env.LAUNCH_TEMPLATE_NAME }}" --query "LaunchTemplates[0].LaunchTemplateId" --output text 2>/dev/null || echo "None")
            echo "| Launch Template (${{ env.LAUNCH_TEMPLATE_NAME }}) | ${LT_ID} |"

            BUCKET_EXISTS=$(aws s3api head-bucket --bucket "${{ env.BUCKET_NAME }}" 2>/dev/null && echo "exists" || echo "None")
            RESULT_COUNT=$(aws s3 ls "s3://${{ env.BUCKET_NAME }}/results/" --recursive 2>/dev/null | wc -l | tr -d ' ')
            echo "| S3 Bucket (${{ env.BUCKET_NAME }}) | ${BUCKET_EXISTS}（results: ${RESULT_COUNT}件） |"

            ROLE_EXISTS=$(aws iam get-role --role-name "${{ env.RESOURCE_PREFIX }}-instance-role-${{ env.STAGE }}" --query "Role.RoleName" --output text 2>/dev/null || echo "None")
            echo "| IAM Role (${{ env.RESOURCE_PREFIX }}-instance-role-${{ env.STAGE }}) | ${ROLE_EXISTS} |"

            echo ""
            echo "⚠️ 上記が \`sst remove\` で削除される。問題なければ Actions画面の **Review deployments** から承認する（\`load-test-ec2-remove\` environmentがRequired reviewer必須）。"
            echo ""
            echo "ℹ️ \`${{ env.SSM_PARAMETER_PREFIX_BASE }}/${{ env.STAGE }}/*\` のSSMパラメータ（base-url/origin/sso-login-id/sso-login-password/auth-token）は"
            echo "\`aws ssm put-parameter\` で別途登録した運用者管理のリソースであり、sstのstate外のため \`sst remove\` では削除されない。"
            echo "不要になった場合は \`aws ssm delete-parameter\` で別途消すこと。"
          } >> "$GITHUB_STEP_SUMMARY"

          # Step Summaryはrunページを下までスクロールしないと気づきにくく、
          # 「Review deployments」ボタンの方を先に見つけてSummaryを見ないまま
          # 承認してしまうケースがある。::warning::アノテーションはrunページの
          # 上部（ワークフロー図の近く）に必ず表示されるため、見落とし防止に使う。
          echo "::warning title=削除対象の確認::VPC(${VPC_ID}) / EIP(${EIP}) / 実行中インスタンス${RUNNING}台 / LaunchTemplate(${LT_ID}) / S3(${BUCKET_EXISTS}, results ${RESULT_COUNT}件) / IAMRole(${ROLE_EXISTS}) が削除対象です。詳細な一覧はこのrunの下部Summaryを確認してから承認してください。"

  infra-deploy:
    if: inputs.infra_action == 'deploy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: sst deploy (load-test-ec2)
        run: pnpm --filter load-test-ec2 run sst:deploy --stage qa
        env:
          SST_TELEMETRY_DISABLED: 1

  # infra-diff の結果（削除対象、Step Summaryに出力）を確認してから remove が実行されるゲート。
  # "load-test-ec2-remove" environment に Required reviewers を設定済みのため、infra-diff完了後
  # 本jobは Waiting となり、Actions画面の Review deployments から承認するまで実行されない。
  infra-remove:
    needs: infra-diff
    if: always() && inputs.infra_action == 'remove' && needs.infra-diff.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: "load-test-ec2-remove"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Guard remove confirmation
        # inputs.confirm_remove は自由入力のためscript injection対策が必要。
        # ${{ }} を run: に直接埋め込むとGitHub Actionsが実行前に文字列置換するため、
        # REMOVE$(...) のような値でコマンド置換が実行されてしまう。env: 経由で
        # シェル変数として受け取り、"$VAR" 参照にすることでこれを防ぐ。
        env:
          CONFIRM_REMOVE: ${{ inputs.confirm_remove }}
        run: |
          if [ "${CONFIRM_REMOVE}" != "REMOVE" ]; then
            echo "::error::infra_action=remove を実行するには confirm_remove に \"REMOVE\" と入力してください"
            exit 1
          fi

      - name: sst remove (load-test-ec2)
        run: pnpm --filter load-test-ec2 run sst:remove --stage qa
        env:
          SST_TELEMETRY_DISABLED: 1

  run-load-test:
    needs: [infra-diff, infra-deploy, infra-remove]
    if: |
      always() &&
      (needs.infra-diff.result == 'success' || needs.infra-diff.result == 'skipped') &&
      (needs.infra-deploy.result == 'success' || needs.infra-deploy.result == 'skipped') &&
      (needs.infra-remove.result == 'success' || needs.infra-remove.result == 'skipped') &&
      inputs.infra_action != 'remove' &&
      inputs.infra_action != 'diff'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Sync scenario / script files to S3
        run: |
          aws s3 sync load-test/scenarios/ "s3://${{ env.BUCKET_NAME }}/scenarios/" --delete
          aws s3 sync load-test-ec2/scripts/ "s3://${{ env.BUCKET_NAME }}/scripts/" --delete

      - name: Resolve network / launch template resources
        id: resources
        run: |
          SUBNET_ID=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=${{ env.RESOURCE_PREFIX }}-public-subnet-${{ env.STAGE }}" \
            --query "Subnets[0].SubnetId" --output text)
          SECURITY_GROUP_ID=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=${{ env.RESOURCE_PREFIX }}-security-group-${{ env.STAGE }}" \
            --query "SecurityGroups[0].GroupId" --output text)
          EIP_ALLOCATION_ID=$(aws ec2 describe-addresses \
            --filters "Name=tag:Name,Values=${{ env.RESOURCE_PREFIX }}-eip-${{ env.STAGE }}" \
            --query "Addresses[0].AllocationId" --output text)
          if [ -z "${SUBNET_ID}" ] || [ "${SUBNET_ID}" = "None" ] || \
             [ -z "${SECURITY_GROUP_ID}" ] || [ "${SECURITY_GROUP_ID}" = "None" ] || \
             [ -z "${EIP_ALLOCATION_ID}" ] || [ "${EIP_ALLOCATION_ID}" = "None" ]; then
            echo "::error::VPC/subnet/security group/EIPが見つかりません。infra_action=deploy を先に実行してください"
            exit 1
          fi
          echo "subnet_id=${SUBNET_ID}" >> "$GITHUB_OUTPUT"
          echo "security_group_id=${SECURITY_GROUP_ID}" >> "$GITHUB_OUTPUT"
          echo "eip_allocation_id=${EIP_ALLOCATION_ID}" >> "$GITHUB_OUTPUT"

      - name: Set test run id
        id: run-id
        run: echo "test_run_id=${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Build user-data
        id: user-data
        # scenario 等のworkflow入力を run: の文字列に直接埋め込まず、必ず env: 経由で
        # シェル変数として受け取る（GitHub Actionsのscript injection対策の標準パターン）。
        # printf '%q' でシェル的に安全な形にエスケープしてから埋め込むことで、値に
        # " や $(...) 等が含まれていてもコマンドとして再解釈されない。
        # ここで扱うのはバケット名・SSMのパス名・シナリオ名・実行IDのみで、
        # 対象URL・認証情報は一切含まない（run-load-test.sh が実行時にSSMから直接取得する）。
        env:
          SCENARIO_INPUT: ${{ inputs.scenario }}
          TEST_RUN_ID_INPUT: ${{ steps.run-id.outputs.test_run_id }}
        run: |
          RESULTS_BUCKET_NAME_ESCAPED=$(printf '%q' "${{ env.BUCKET_NAME }}")
          SSM_PARAMETER_PREFIX_ESCAPED=$(printf '%q' "${{ env.SSM_PARAMETER_PREFIX_BASE }}/${{ env.STAGE }}")
          SCENARIO_NAME_ESCAPED=$(printf '%q' "${SCENARIO_INPUT}")
          TEST_RUN_ID_ESCAPED=$(printf '%q' "${TEST_RUN_ID_INPUT}")

          sed \
            -e "s|__RESULTS_BUCKET_NAME__|${RESULTS_BUCKET_NAME_ESCAPED}|g" \
            -e "s|__SSM_PARAMETER_PREFIX__|${SSM_PARAMETER_PREFIX_ESCAPED}|g" \
            -e "s|__SCENARIO_NAME__|${SCENARIO_NAME_ESCAPED}|g" \
            -e "s|__TEST_RUN_ID__|${TEST_RUN_ID_ESCAPED}|g" \
            load-test-ec2/user-data.sh > /tmp/user-data.sh

      - name: Run k6 instance on EC2
        id: run-instance
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --launch-template "LaunchTemplateName=${{ env.LAUNCH_TEMPLATE_NAME }},Version=\$Latest" \
            --user-data file:///tmp/user-data.sh \
            --count 1 \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=${{ env.RESOURCE_PREFIX }}-instance-${{ env.STAGE }}},{Key=TestRunId,Value=${{ steps.run-id.outputs.test_run_id }}}]" \
            --query "Instances[0].InstanceId" --output text)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "[load-test-ec2] launched instance ${INSTANCE_ID}"

      - name: Associate Elastic IP (fixed source IP)
        run: |
          aws ec2 wait instance-running --instance-ids "${{ steps.run-instance.outputs.instance_id }}"
          aws ec2 associate-address \
            --instance-id "${{ steps.run-instance.outputs.instance_id }}" \
            --allocation-id "${{ steps.resources.outputs.eip_allocation_id }}"

      - name: Wait for instance termination
        # aws ec2 wait instance-terminated は15秒間隔×40回(=約10分)で固定されており、
        # --delay/--max-attempts のような調整用オプションが無い。一方インスタンス側
        # (user-data.sh/run-load-test.sh)のリトライは接続タイムアウトを含めると
        # 最悪ケースで10分を超えうるため、単発のwaitだと本来のk6実行結果を見る前に
        # ワーカー側の都合でジョブが失敗しうる。waiterを複数回呼び直すことで
        # 実質的な待機時間を延ばす。
        run: |
          for i in 1 2 3; do
            if aws ec2 wait instance-terminated --instance-ids "${{ steps.run-instance.outputs.instance_id }}"; then
              exit 0
            fi
            echo "[load-test-ec2] instance-terminated wait timed out (attempt ${i}/3), retrying wait..."
          done
          echo "::error::30分待ってもインスタンスが終了しませんでした。EC2コンソールでインスタンス ${{ steps.run-instance.outputs.instance_id }} の状態を確認すること"
          exit 1

      - name: Check k6 exit code
        id: check-exit-code
        run: |
          TEST_RUN_ID="${{ steps.run-id.outputs.test_run_id }}"
          SUMMARY_URL="s3://${{ env.BUCKET_NAME }}/results/${TEST_RUN_ID}/summary.json"
          LOG_URL="s3://${{ env.BUCKET_NAME }}/results/${TEST_RUN_ID}/user-data.log"
          EXIT_CODE=$(aws s3 cp "s3://${{ env.BUCKET_NAME }}/results/${TEST_RUN_ID}/exit_code" - 2>/dev/null || echo "")
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "results_url=${SUMMARY_URL}" >> "$GITHUB_OUTPUT"

          # 成功・失敗どちらでも、結果の場所を必ずSummaryに残す
          # （GitHub Actionsの GITHUB_OUTPUT はログ画面には表示されないため）
          {
            echo "## 実行結果"
            echo "- test_run_id: \`${TEST_RUN_ID}\`"
            echo "- exit_code: \`${EXIT_CODE:-（見つかりません）}\`"
            echo "- 結果: \`${SUMMARY_URL}\`"
            echo "- ログ: \`${LOG_URL}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -z "${EXIT_CODE}" ]; then
            echo "::error::exit_code が見つからない（インスタンス起動処理自体が失敗した可能性）。${LOG_URL} を確認すること"
            exit 1
          fi
          if [ "${EXIT_CODE}" != "0" ]; then
            echo "::error::k6 task exited with code ${EXIT_CODE} (thresholds failed or execution error). ${LOG_URL} を確認すること"
            exit 1
          fi

      - name: Notify Slack
        if: always() && env.SLACK_LOAD_TEST_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_LOAD_TEST_WEBHOOK_URL: ${{ secrets.SLACK_LOAD_TEST_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ env.SLACK_LOAD_TEST_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            scenario: "${{ inputs.scenario }} (EC2)"
            test_run_id: "${{ steps.run-id.outputs.test_run_id }}"
            exit_code: "${{ steps.check-exit-code.outputs.exit_code }}"
            results_url: "${{ steps.check-exit-code.outputs.results_url }}"
            run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
